name: PDUAM Notice Scraper

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  scrape-and-notify:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install dependencies
        run: |
          echo "Installing root dependencies..."
          npm install
          echo "Installing frontend dependencies..."
          cd frontend && npm install && cd ..
          echo "Installing scraper dependencies..."
          cd scraper && npm install && cd ..
          echo "Dependency installation complete"

      - name: Verify dependencies
        run: |
          echo "=== Checking nodemailer availability ==="
          if [ -d "frontend/node_modules/nodemailer" ]; then
            echo "✓ nodemailer found in frontend/node_modules"
          else
            echo "✗ WARNING: nodemailer NOT in frontend/node_modules"
          fi
          if [ -d "scraper/node_modules/nodemailer" ]; then
            echo "✓ nodemailer found in scraper/node_modules"
          else
            echo "✗ WARNING: nodemailer NOT in scraper/node_modules"
          fi
          echo "=== Dependency Check Complete ==="

      - name: Run scraper
        working-directory: scraper
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          CUSTOM_FROM_EMAIL: ${{ secrets.CUSTOM_FROM_EMAIL }}
          REPLY_TO_EMAIL: ${{ secrets.REPLY_TO_EMAIL }}
          NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}
          GOOGLE_SERVICE_JSON: ${{ secrets.GOOGLE_SERVICE_JSON }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          HASH_SALT: ${{ secrets.HASH_SALT }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
        run: node scrape.js

      - name: Commit updated notices
        run: |
          git config user.name "PDUAM Notice Bot"
          git config user.email "bot@pduam-notify.github.io"
          git add data/notices.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "📋 Update notices $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
          fi

      - name: Log completion
        if: always()
        run: echo "Scraper completed at $(date -u '+%Y-%m-%d %H:%M UTC')"
