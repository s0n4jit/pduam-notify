name: PDUAM Notice Scraper

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  scrape-and-notify:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install scraper dependencies
        working-directory: scraper
        run: npm ci || npm install

      - name: Run scraper
        working-directory: scraper
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          CUSTOM_FROM_EMAIL: ${{ secrets.CUSTOM_FROM_EMAIL }}
          REPLY_TO_EMAIL: ${{ secrets.REPLY_TO_EMAIL }}
          NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}
          GOOGLE_SERVICE_JSON: ${{ secrets.GOOGLE_SERVICE_JSON }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          HASH_SALT: ${{ secrets.HASH_SALT }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
        run: node scrape.js

      - name: Commit updated notices
        run: |
          git config user.name "PDUAM Notice Bot"
          git config user.email "bot@pduam-notify.github.io"
          git add data/notices.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "📋 Update notices $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
          fi

      - name: Log completion
        if: always()
        run: echo "Scraper completed at $(date -u '+%Y-%m-%d %H:%M UTC')"
