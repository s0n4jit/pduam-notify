<!DOCTYPE html>
<html lang="en" xmlns="http://www.w3.org/1999/xhtml" xmlns:v="urn:schemas-microsoft-com:vml" xmlns:o="urn:schemas-microsoft-com:office:office">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="color-scheme" content="light dark">
  <meta name="supported-color-schemes" content="light dark">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <!--[if mso]><noscript><xml><o:OfficeDocumentSettings><o:PixelsPerInch>96</o:PixelsPerInch></o:OfficeDocumentSettings></xml></noscript><![endif]-->
  <title>{{SENDER_NAME}}</title>
  <style>
    /* ── Reset ── */
    *, *::before, *::after { box-sizing: border-box; }
    body, table, td, a { -webkit-text-size-adjust:100%; -ms-text-size-adjust:100%; }
    table, td { mso-table-lspace:0pt; mso-table-rspace:0pt; border-collapse:collapse !important; }
    body { margin:0; padding:0; width:100% !important; }
    img { border:0; height:auto; line-height:100%; outline:none; text-decoration:none; -ms-interpolation-mode:bicubic; }
    a { color:inherit; text-decoration:none; }

    /* ── Typography & Layout ── */
    body {
      background-color: #f8fafc;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Dark mode overrides ── */
    @media (prefers-color-scheme: dark) {
      body, .email-bg { background-color:#0b0f19 !important; }
      .email-card { background-color:#111827 !important; border-color:#1f2937 !important; box-shadow: 0 10px 30px -10px rgba(0,0,0,0.5) !important; }
      .email-header-bg { background: linear-gradient(135deg, #1e1b4b, #311042) !important; }
      .email-body { background-color:#111827 !important; }
      .email-footer-bg { background-color:#0b0f19 !important; border-top-color:#1f2937 !important; }
      .text-dark { color:#f9fafb !important; }
      .text-muted { color:#9ca3af !important; }
      .text-subtle { color:#6b7280 !important; }
      .divider { border-color:#1f2937 !important; }
      .badge-bg { background-color:#1e1b4b !important; border-color:#311042 !important; }
      .notice-row { background-color:#1f2937 !important; border-color:#374151 !important; }
      .btn-primary { background: linear-gradient(135deg, #6366f1, #4f46e5) !important; color:#ffffff !important; }
      .btn-secondary { background-color:#1f2937 !important; color:#818cf8 !important; border-color:#374151 !important; }
    }

    @media only screen and (max-width: 600px) {
      .email-card { width:100% !important; border-radius:0 !important; }
      .email-pad { padding:24px 20px !important; }
      .email-pad-sm { padding:20px 16px !important; }
      .notice-title { font-size:14px !important; }
    }
  </style>
</head>
<body class="email-bg" style="margin:0;padding:0;background-color:#f8fafc;">

  <!-- Preheader (invisible preview text) -->
  <div style="display:none;font-size:1px;line-height:1px;max-height:0;max-width:0;opacity:0;overflow:hidden;">{{PREHEADER}}&zwnj;&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;</div>

  <!-- Outer wrapper -->
  <table width="100%" cellpadding="0" cellspacing="0" role="presentation" style="background-color:#f8fafc;" class="email-bg">
    <tr>
      <td align="center" style="padding:40px 16px;">

        <!-- Card -->
        <table width="600" cellpadding="0" cellspacing="0" role="presentation"
          class="email-card"
          style="background-color:#ffffff;border-radius:24px;overflow:hidden;border:1px solid #e5e7eb;max-width:600px;width:100%;box-shadow: 0 10px 25px -5px rgba(0,0,0,0.03), 0 8px 10px -6px rgba(0,0,0,0.03);">

          <!-- ── Header ── -->
          <tr>
            <td class="email-header-bg" style="background: linear-gradient(135deg, #4f46e5, #7c3aed); padding: 36px 40px;" class="email-pad">
              <table width="100%" cellpadding="0" cellspacing="0" role="presentation">
                <tr>
                  <td width="44" valign="middle" style="padding-right:16px;">
                    <div style="background: rgba(255, 255, 255, 0.15); border-radius: 12px; width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(4px);">
                      <img src="https://notify-pduam.vercel.app/icon.svg" width="24" height="24" alt="🔔" style="display:block; margin:auto;">
                    </div>
                  </td>
                  <td valign="middle">
                    <p style="margin:0;font-size:16px;font-weight:800;color:#ffffff;letter-spacing:0.03em;text-transform:uppercase;">{{SENDER_NAME}}</p>
                    <p style="margin:4px 0 0;font-size:11px;color:#c7d2fe;font-weight:500;letter-spacing:0.02em;">{{COLLEGE_NAME}}</p>
                  </td>
                </tr>
              </table>
            </td>
          </tr>

          <!-- ── Body ── -->
          <tr>
            <td class="email-body email-pad" style="background-color:#ffffff;padding:40px 48px;">
              {{BODY}}
            </td>
          </tr>

          <!-- ── Footer ── -->
          <tr>
            <td class="email-footer-bg email-pad-sm"
              style="background-color:#f9fafb;padding:24px 48px;border-top:1px solid #f3f4f6;text-align:center;" class="divider">
              <p style="margin:0;font-size:11px;line-height:1.7;" class="text-subtle">
                <span style="color:#6b7280;">You're receiving this because you subscribed at </span>
                <a href="{{SITE_URL}}" style="color:#4f46e5;font-weight:600;">{{SITE_URL_DISPLAY}}</a>
              </p>
              
              <!-- Help & Queries Section -->
              <p style="margin:8px 0 0;font-size:11px;color:#9ca3af;" class="text-muted">
                Questions or issues? Email us at <a href="mailto:hello@sonajit.in" style="color:#4f46e5;font-weight:600;text-decoration:underline;">hello@sonajit.in</a>
              </p>

              <p style="margin:16px 0 0;font-size:11px;">
                <a href="{{UNSUBSCRIBE_LINK}}" style="color:#6b7280;text-decoration:underline;">Unsubscribe</a>
                <span style="color:#d1d5db;padding:0 8px;">•</span>
                <a href="{{SITE_URL}}/privacy-policy" style="color:#6b7280;text-decoration:underline;">Privacy Policy</a>
                <span style="color:#d1d5db;padding:0 8px;">•</span>
                <a href="{{NOTICE_URL}}" style="color:#6b7280;text-decoration:underline;">Notice Board</a>
              </p>
            </td>
          </tr>

        </table>

        <!-- Copyright -->
        <p style="margin:20px 0 0;font-size:11px;color:#9ca3af;text-align:center;" class="text-muted">
          © {{YEAR}} PDUAM NOTIFY | Built By sOn4jit.
        </p>

      </td>
    </tr>
  </table>

</body>
</html>
