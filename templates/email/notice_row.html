<tr>
  <td class="notice-row" style="padding:18px 20px;border-bottom:1px solid #f3f4f6;" class="divider">
    <table width="100%" cellpadding="0" cellspacing="0" role="presentation">
      <tr>
        <td>
          <span style="display:inline-block;background:#fef3c7;color:#d97706;font-size:9px;font-weight:800;padding:3px 8px;border-radius:6px;letter-spacing:0.05em;text-transform:uppercase;margin-bottom:8px;">NEW NOTICE</span>
          <p class="notice-title text-dark" style="margin:0 0 6px;font-size:15px;font-weight:700;color:#111827;line-height:1.45;">{{TITLE}}</p>
          {{DATE_HTML}}
          <a href="{{URL}}" style="display:inline-block;font-size:12px;font-weight:700;color:#4f46e5;text-decoration:none;">
            Open Notice Document →
          </a>
        </td>
      </tr>
    </table>
  </td>
</tr>
